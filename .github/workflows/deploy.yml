name: Deploy to Production/Dev

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'
      
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          ${{ secrets.ENV_FILE }}
          EOF

      - name: Build
        run: yarn build
        env:
          REACT_APP_STUDY_MATERIALS_API_URL: ${{ secrets.REACT_APP_STUDY_MATERIALS_API_URL }}
          REACT_APP_STUDY_MATERIALS_WIDGET_URL: ${{ secrets.REACT_APP_STUDY_MATERIALS_WIDGET_URL }}
      
      - name: Deploy to ${{ github.event.inputs.environment }}
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST_DEV: ${{ secrets.DEPLOY_HOST_DEV }}
          DEPLOY_HOST_PROD: ${{ secrets.DEPLOY_HOST_PROD }}
        run: |
          if [ "${{ github.event.inputs.environment }}" = "prod" ]; then
            DEPLOY_HOST="$DEPLOY_HOST_PROD"
          else
            DEPLOY_HOST="$DEPLOY_HOST_DEV"
          fi

          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

          TARGET_PATH="/usr/share/angie/html/galaxy/${{ github.event.inputs.environment }}/user"

          # Ensure deploy user owns the target directory
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "sudo chown -R $DEPLOY_USER:$DEPLOY_USER /usr/share/angie/html/galaxy/ 2>/dev/null || true"

          # Backup existing files
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "rm -rf $TARGET_PATH.backup && cp -r $TARGET_PATH $TARGET_PATH.backup"

          # Remove old folder and create fresh one
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "rm -rf $TARGET_PATH && mkdir -p $TARGET_PATH"

          # Sync new files (no --delete needed)
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" \
            --exclude='.env' \
            --exclude='node_modules' \
            build/ \
            "$DEPLOY_USER@$DEPLOY_HOST:$TARGET_PATH/"
